<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:12px;align-items:flex-end;}
  .swatch{width:88px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--stroke);}
  .chip{height:88px;}
  .meta{padding:8px 10px;background:var(--surface-1);}
  .name{font:var(--t-small);color:var(--ivory-50);font-weight:600;}
  .hex{font:var(--t-mono);color:var(--ivory-500);font-size:11px;}
  .lbl{font:var(--t-eyebrow);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ivory-500);margin:0 0 12px;}
  .group{margin-bottom:16px;}
</style></head><body>
<div class="group">
  <div class="lbl">Sage · system OK / agent active</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#A8C0A8"></div><div class="meta"><div class="name">sage-300</div><div class="hex">#A8C0A8</div></div></div>
    <div class="swatch"><div class="chip" style="background:#7E9B7E"></div><div class="meta"><div class="name">sage-400</div><div class="hex">#7E9B7E</div></div></div>
    <div class="swatch"><div class="chip" style="background:#4F6A4F"></div><div class="meta"><div class="name">sage-600</div><div class="hex">#4F6A4F</div></div></div>
    <div class="swatch"><div class="chip" style="background:#E26A4C"></div><div class="meta"><div class="name">ember-400</div><div class="hex">#E26A4C</div></div></div>
    <div class="swatch"><div class="chip" style="background:#C24A2C"></div><div class="meta"><div class="name">ember-500</div><div class="hex">#C24A2C</div></div></div>
    <div class="swatch"><div class="chip" style="background:#7E2C18"></div><div class="meta"><div class="name">ember-700</div><div class="hex">#7E2C18</div></div></div>
  </div>
</div>
</body></html>
