<!doctype html>
<html><head><meta charset="utf-8"><title>Brand energy</title>
<style>
  body { margin:0; padding:0; background:#0a0604; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:2px; }
  .grid img { display:block; width:100%; height:auto; }
  .full { grid-column: 1 / -1; }
  .label { position:absolute; top:14px; left:18px; font:600 10px/12px 'Manrope',system-ui,sans-serif; letter-spacing:.12em; text-transform:uppercase; color:#FFE89A; text-shadow:0 1px 4px rgba(0,0,0,0.7); }
  .frame { position:relative; }
</style></head>
<body>
  <div class="grid">
    <div class="frame full"><img src="../assets/brand/header_honeycomb_light.png"><span class="label">Header · molten honeycomb</span></div>
    <div class="frame"><img src="../assets/brand/hive_texture_dark.png"><span class="label">Hive texture · dark</span></div>
    <div class="frame"><img src="../assets/brand/material_strip_dark.png"><span class="label">Material language</span></div>
    <div class="frame full"><img src="../assets/brand/brand_energy_strip.png"><span class="label">Brand energy · molten flow</span></div>
  </div>
</body></html>
