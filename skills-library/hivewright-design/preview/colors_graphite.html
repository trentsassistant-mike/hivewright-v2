<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:12px;align-items:flex-end;}
  .swatch{width:88px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--stroke);}
  .chip{height:88px;}
  .meta{padding:8px 10px;background:var(--surface-1);}
  .name{font:var(--t-small);color:var(--ivory-50);font-weight:600;}
  .hex{font:var(--t-mono);color:var(--ivory-500);font-size:11px;}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#0B0C0E"></div><div class="meta"><div class="name">bg</div><div class="hex">#0B0C0E</div></div></div>
  <div class="swatch"><div class="chip" style="background:#0F1114"></div><div class="meta"><div class="name">well</div><div class="hex">#0F1114</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14161A"></div><div class="meta"><div class="name">surface-1</div><div class="hex">#14161A</div></div></div>
  <div class="swatch"><div class="chip" style="background:#1B1E22"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#1B1E22</div></div></div>
  <div class="swatch"><div class="chip" style="background:#262A2F"></div><div class="meta"><div class="name">surface-3</div><div class="hex">#262A2F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#3A382F"></div><div class="meta"><div class="name">ivory-700</div><div class="hex">#3A382F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#6F6A60"></div><div class="meta"><div class="name">ivory-500</div><div class="hex">#6F6A60</div></div></div>
</div>
</body></html>
