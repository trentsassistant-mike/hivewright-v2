<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:12px;align-items:flex-end;}
  .swatch{width:88px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--stroke);}
  .chip{height:88px;display:flex;align-items:center;justify-content:center;font:var(--t-h2);font-weight:600;}
  .meta{padding:8px 10px;background:var(--surface-1);}
  .name{font:var(--t-small);color:var(--ivory-50);font-weight:600;}
  .hex{font:var(--t-mono);color:var(--ivory-500);font-size:11px;}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#14161A;color:#F2EBDD;">Aa</div><div class="meta"><div class="name">ivory-50</div><div class="hex">#F2EBDD · primary</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14161A;color:#D4CCBA;">Aa</div><div class="meta"><div class="name">ivory-200</div><div class="hex">#D4CCBA</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14161A;color:#B8B0A0;">Aa</div><div class="meta"><div class="name">ivory-300</div><div class="hex">#B8B0A0 · secondary</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14161A;color:#6F6A60;">Aa</div><div class="meta"><div class="name">ivory-500</div><div class="hex">#6F6A60 · tertiary</div></div></div>
  <div class="swatch"><div class="chip" style="background:#14161A;color:#3A382F;">Aa</div><div class="meta"><div class="name">ivory-700</div><div class="hex">#3A382F · disabled</div></div></div>
</div>
</body></html>
