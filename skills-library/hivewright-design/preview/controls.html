<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-ui);display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
  .toggle{position:relative;width:42px;height:24px;border-radius:999px;background:var(--surface-3);border:1px solid var(--stroke);cursor:pointer;transition:background var(--dur-fast) var(--ease);}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--ivory-300);transition:all var(--dur-fast) var(--ease);}
  .toggle.on{background:var(--honey-500);box-shadow:var(--glow-honey);}
  .toggle.on::after{left:20px;background:#1A0F00;}
  .check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--brass-400);background:transparent;display:inline-flex;align-items:center;justify-content:center;color:var(--honey-300);}
  .check.on{background:var(--honey-500);border-color:var(--honey-500);color:#1A0F00;}
  .radio{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--brass-400);display:inline-flex;align-items:center;justify-content:center;}
  .radio.on::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--honey-500);}
  .group{display:flex;align-items:center;gap:8px;color:var(--ivory-200);font-size:13px;}
  .tabs{display:flex;gap:2px;background:var(--surface-1);padding:3px;border-radius:var(--r-md);border:1px solid var(--stroke);}
  .tab{padding:6px 14px;font-size:13px;font-weight:600;color:var(--ivory-300);border-radius:8px;cursor:pointer;}
  .tab.on{background:var(--surface-3);color:var(--ivory-50);}
</style></head><body>
<div class="group"><div class="toggle on"></div><span>Auto-approve</span></div>
<div class="group"><div class="toggle"></div><span>Paused</span></div>
<div class="group"><div class="check on"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="5,12 10,17 19,7"/></svg></div><span>Notify on failure</span></div>
<div class="group"><div class="radio on"></div><span>Manual approval</span></div>
<div class="tabs"><div class="tab on">Overview</div><div class="tab">Activity</div><div class="tab">Settings</div></div>
</body></html>
