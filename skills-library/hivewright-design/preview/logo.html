<!doctype html>
<html><head><meta charset="utf-8"><title>Brand mark</title>
<style>
  body { margin:0; min-height:100vh; display:grid; place-items:center;
    background: radial-gradient(ellipse at center, #1a120a 0%, #0a0604 70%); }
  .row { display:flex; gap:48px; align-items:center; }
  .panel { padding:32px; border-radius:16px; background:#0F0905; border:1px solid rgba(255,184,54,0.15); }
  .light { background:#F7F1E1; border-color:rgba(0,0,0,0.08); }
  img { display:block; }
  .label { font:600 11px/14px 'Manrope',system-ui,sans-serif; letter-spacing:.08em; text-transform:uppercase; color:#B89060; margin-top:14px; text-align:center; }
  .light .label { color:#8A6620; }
</style></head>
<body>
  <div class="row">
    <div class="panel">
      <img src="../assets/brand/hivewright_mark.svg" width="200" height="200">
      <div class="label">Primary · Molten Honey</div>
    </div>
    <div class="panel light">
      <img src="../assets/brand/hivewright_mark.svg" width="200" height="200">
      <div class="label">Light surface</div>
    </div>
    <div class="panel">
      <img src="../assets/brand/hivewright_mark_mono.svg" width="200" height="200">
      <div class="label">Mono · Ivory</div>
    </div>
  </div>
</body></html>
