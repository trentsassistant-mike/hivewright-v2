<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-ui);}
  .card{background:var(--surface-1);border:1px solid var(--stroke);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow-card);}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .eyebrow{font:var(--t-eyebrow);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ivory-500);}
  .num{font:var(--t-display);font-size:48px;line-height:1;color:var(--ivory-50);font-variant-numeric:tabular-nums;letter-spacing:-0.02em;font-family:var(--font-display);font-weight:500;}
  .delta{font-size:12px;color:var(--sage-300);margin-top:4px;}
  .spark{margin-top:10px;}
  .row{display:flex;gap:12px;}
</style></head><body>
<div class="row">
  <div class="card" style="flex:1">
    <div class="head"><div class="eyebrow">Active runs</div><svg width="16" height="16" style="color:var(--brass-400)"><use href="../assets/icons/icons.svg#hex"/></svg></div>
    <div class="num">128</div>
    <div class="delta">+12 vs yesterday</div>
    <svg class="spark" viewBox="0 0 220 36" width="100%" height="36" fill="none" stroke="#E59A1B" stroke-width="1.5">
      <polyline points="0,28 20,24 40,26 60,18 80,20 100,14 120,16 140,10 160,12 180,8 200,6 220,4"/>
    </svg>
  </div>
  <div class="card" style="flex:1">
    <div class="head"><div class="eyebrow">System health</div><svg width="16" height="16" style="color:var(--sage-400)"><use href="../assets/icons/icons.svg#shield"/></svg></div>
    <div class="num">92<span style="font-size:24px;color:var(--ivory-300)">%</span></div>
    <div class="delta" style="color:var(--ivory-500)">7d uptime</div>
    <svg class="spark" viewBox="0 0 220 36" width="100%" height="36" fill="none" stroke="#7E9B7E" stroke-width="1.5">
      <polyline points="0,12 20,10 40,14 60,12 80,10 100,8 120,18 140,8 160,10 180,8 200,6 220,8"/>
    </svg>
  </div>
</div>
</body></html>
