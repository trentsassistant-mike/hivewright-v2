<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);font-family:var(--font-ui);}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .tok{display:flex;align-items:center;gap:10px;}
  .bar{height:14px;background:var(--honey-500);border-radius:2px;}
  .lbl{font:var(--t-mono);color:var(--ivory-300);}
</style></head><body>
<div class="row">
  <div class="tok"><div class="bar" style="width:4px"></div><div class="lbl">4</div></div>
  <div class="tok"><div class="bar" style="width:8px"></div><div class="lbl">8</div></div>
  <div class="tok"><div class="bar" style="width:12px"></div><div class="lbl">12</div></div>
  <div class="tok"><div class="bar" style="width:16px"></div><div class="lbl">16</div></div>
  <div class="tok"><div class="bar" style="width:20px"></div><div class="lbl">20</div></div>
  <div class="tok"><div class="bar" style="width:24px"></div><div class="lbl">24</div></div>
  <div class="tok"><div class="bar" style="width:32px"></div><div class="lbl">32</div></div>
  <div class="tok"><div class="bar" style="width:48px"></div><div class="lbl">48</div></div>
  <div class="tok"><div class="bar" style="width:64px"></div><div class="lbl">64</div></div>
</div>
<div style="margin-top:24px;display:flex;gap:24px;align-items:flex-end;">
  <div style="text-align:center;"><div style="width:40px;height:40px;background:var(--surface-1);border:1px solid var(--stroke);border-radius:6px;"></div><div class="lbl" style="margin-top:6px;">r-sm 6</div></div>
  <div style="text-align:center;"><div style="width:48px;height:48px;background:var(--surface-1);border:1px solid var(--stroke);border-radius:10px;"></div><div class="lbl" style="margin-top:6px;">r-md 10</div></div>
  <div style="text-align:center;"><div style="width:56px;height:56px;background:var(--surface-1);border:1px solid var(--stroke);border-radius:12px;"></div><div class="lbl" style="margin-top:6px;">r-lg 12</div></div>
  <div style="text-align:center;"><div style="width:64px;height:64px;background:var(--surface-1);border:1px solid var(--stroke);border-radius:18px;"></div><div class="lbl" style="margin-top:6px;">r-xl 18</div></div>
</div>
</body></html>
