<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);}
  .row{display:flex;gap:12px;align-items:flex-end;}
  .swatch{width:88px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--stroke);}
  .swatch .chip{height:88px;}
  .swatch .meta{padding:8px 10px;background:var(--surface-1);}
  .name{font:var(--t-small);color:var(--ivory-50);font-weight:600;}
  .hex{font:var(--t-mono);color:var(--ivory-500);font-size:11px;}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#FFC562"></div><div class="meta"><div class="name">honey-300</div><div class="hex">#FFC562</div></div></div>
  <div class="swatch"><div class="chip" style="background:#E59A1B;box-shadow:var(--glow-honey)"></div><div class="meta"><div class="name">honey-500</div><div class="hex">#E59A1B</div></div></div>
  <div class="swatch"><div class="chip" style="background:#A86A0F"></div><div class="meta"><div class="name">honey-700</div><div class="hex">#A86A0F</div></div></div>
  <div class="swatch"><div class="chip" style="background:#5C3A06"></div><div class="meta"><div class="name">honey-900</div><div class="hex">#5C3A06</div></div></div>
  <div class="swatch"><div class="chip" style="background:#D4A878"></div><div class="meta"><div class="name">brass-300</div><div class="hex">#D4A878</div></div></div>
  <div class="swatch"><div class="chip" style="background:#B8895A"></div><div class="meta"><div class="name">brass-400</div><div class="hex">#B8895A</div></div></div>
  <div class="swatch"><div class="chip" style="background:#8E6638"></div><div class="meta"><div class="name">brass-500</div><div class="hex">#8E6638</div></div></div>
</div>
</body></html>
